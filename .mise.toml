[tasks.dev]
description = "Run the server in development mode"
run = "go run ./cmd/server"

[tasks.build]
description = "Build the server binary"
run = "go build -o bin/server ./cmd/server"

[tasks.test]
description = "Run all tests"
run = "go test ./tests/..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks."migrate:up"]
description = "Run all up migrations"
run = "go run ./cmd/migrate -up"

[tasks."migrate:down"]
description = "Run all down migrations"
run = "go run ./cmd/migrate -down"

[tasks."migrate:version"]
description = "Print current migration version"
run = "go run ./cmd/migrate -version"

[tasks."web:fmt"]
description = "Format web client source files"
run = "cd app && bunx prettier --write client/"

[tasks."web:build"]
description = "Build the web client"
run = "cd app && bun run build"

[tasks."web:watch"]
description = "Watch and rebuild the web client"
run = "cd app && bun run watch"
